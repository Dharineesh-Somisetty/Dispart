<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Schedule - Vibrant</title>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec1313",
              "background-light": "#FFF9F0",
              "background-dark": "#221010",
              "surface": "#FFFFFF",
              "text-main": "#1A2238",
              "muted": "#A8A3B5",
              "accent": "#4ECDC4",
            },
            fontFamily: {
              "display": ["Spline Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px"},
            boxShadow: {
              'soft': '0 12px 24px -8px rgba(236, 19, 19, 0.25)',
              'float': '0 20px 40px -12px rgba(26, 34, 56, 0.08)',
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: theme('colors.background-light');
            font-family: theme('fontFamily.display');
            color: theme('colors.text-main');
            position: relative;
        }
        /* Grain overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 50;
        }

        /* Timeline styling */
        .timeline-container {
            position: relative;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .timeline-track {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background-image: linear-gradient(to bottom, transparent 50%, theme('colors.muted') 50%);
            background-size: 100% 24px;
            top: 0;
            z-index: 0;
        }

        .timeline-item {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
            z-index: 10;
        }

        .timeline-item:nth-child(even) {
            flex-direction: row-reverse;
        }

        .timeline-card-wrapper {
            width: 45%;
            position: relative;
        }

        .timeline-node {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background-color: theme('colors.primary');
            border-radius: 50%;
            border: 4px solid theme('colors.background-light');
            z-index: 20;
            transition: all 0.3s ease;
        }

        .timeline-item:hover .timeline-node {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 15px rgba(236, 19, 19, 0.4);
        }

        .timeline-date-header {
            display: flex;
            justify-content: center;
            margin: 60px 0;
            position: relative;
            z-index: 20;
        }

        .date-pill {
            background-color: theme('colors.accent');
            color: theme('colors.text-main');
            padding: 8px 24px;
            border-radius: theme('borderRadius.full');
            font-weight: 700;
            font-size: 1.125rem;
            box-shadow: theme('boxShadow.float');
        }

        .schedule-card {
            background: theme('colors.surface');
            border-radius: theme('borderRadius.xl');
            padding: 20px;
            box-shadow: theme('boxShadow.float');
            display: flex;
            gap: 20px;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .schedule-card:hover {
            transform: translateY(-8px);
            box-shadow: theme('boxShadow.soft');
        }

        .card-image {
            width: 100px;
            height: 100px;
            border-radius: theme('borderRadius.lg');
            object-fit: cover;
        }

        /* Connector Lines */
        .connector-line {
            position: absolute;
            top: 50%;
            width: 10%;
            height: 2px;
            background-color: theme('colors.muted');
            opacity: 0.5;
            z-index: 0;
        }
        .timeline-item:nth-child(odd) .connector-line {
            right: -11%;
        }
        .timeline-item:nth-child(even) .connector-line {
            left: -11%;
        }


        @media (max-width: 768px) {
            .timeline-track {
                left: 30px;
            }
            .timeline-item, .timeline-item:nth-child(even) {
                flex-direction: row;
                justify-content: flex-end;
            }
            .timeline-card-wrapper {
                width: calc(100% - 70px);
            }
            .timeline-node {
                left: 30px;
            }
            .connector-line {
                width: 30px;
                left: -30px !important;
            }
            .timeline-date-header {
                justify-content: flex-start;
                padding-left: 60px;
            }
        }
    </style>
</head>
<body class="antialiased min-h-screen">
<!-- TopNavBar Shared Component -->
<div class="relative flex h-auto w-full flex-col bg-background-light group/design-root overflow-x-hidden">

</div>

</div>
</header>
<div class="flex flex-wrap justify-between gap-3 p-4 mt-8">

</div>
<!-- Main Timeline Area -->
<main class="timeline-container w-full mt-4">

<!-- Date Header -->
<div class="timeline-date-header">
<div class="date-pill">This Weekend</div>
</div>
<!-- Timeline Item 1 -->
<div class="timeline-item">

<div class="flex flex-col flex-grow">

<div class="flex items-center text-muted text-sm font-semibold mb-1">

</div>
<button class="hidden md:flex items-center justify-center p-2 rounded-full hover:bg-background-light text-primary transition-colors">

</a>
</div>
<div class="w-[45%] hidden md:block"></div> <!-- Spacer -->
</div>
</main>
</div>
</div>
</div>
</div>
</body></html>
